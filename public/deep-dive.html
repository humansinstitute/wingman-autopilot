<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Wingman Deep Dive</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" sizes="32x32" href="/path/Wingman_Goose_Logo_Light.png" />
    <link rel="apple-touch-icon" href="/path/Wingman_Goose_Logo.png" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/deep-dive.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  </head>
  <body class="theme-auto">
    <header class="wm-header">
      <div class="wm-brand">
        <img src="/path/Wingman_Goose_Logo_Dark.png" alt="Wingman logo" width="32" height="32" class="wm-logo dark" />
        <img src="/path/Wingman_Goose_Logo_Light.png" alt="Wingman logo" width="32" height="32" class="wm-logo light" />
        <div>
          <h1>Wingman</h1>
          <p class="wm-tagline">Solvitur Ambulando</p>
        </div>
      </div>
      <a class="wm-button secondary deep-dive-back" href="/home">&larr; Back to Wingmen</a>
    </header>
    <main class="deep-dive-main">
      <section class="terminal-card">
        <header class="terminal-card__header">
          <div class="terminal-controls">
            <div class="terminal-dropdown" data-state="closed">
              <button id="tmux-toggle" class="wm-button" aria-haspopup="true" aria-expanded="false">TMUX ▾</button>
              <div class="terminal-dropdown__menu" role="menu" aria-hidden="true">
                <button type="button" data-command="detach" role="menuitem">Ctrl+B D · Detach Session</button>
                <button type="button" data-command="new-window" role="menuitem">Ctrl+B C · New Window</button>
                <button type="button" data-command="next-window" role="menuitem">Ctrl+B N · Next Window</button>
                <button type="button" data-command="last-window" role="menuitem">Ctrl+B L · Last Window</button>
                <button type="button" data-command="zoom" role="menuitem">Ctrl+B Z · Zoom Pane</button>
                <button type="button" data-command="split-vertical" role="menuitem">Ctrl+B % · Vertical Split</button>
                <button type="button" data-command="split-horizontal" role="menuitem">Ctrl+B &quot; · Horizontal Split</button>
                <button type="button" data-command="kill-pane" role="menuitem">Ctrl+B X · Kill Pane</button>
                <button type="button" data-command="list-sessions" role="menuitem">Ctrl+B S · List Sessions</button>
                <button type="button" data-command="list-windows" role="menuitem">Ctrl+B W · List Windows</button>
                <button type="button" data-command="clear" role="menuitem">Ctrl+L · Clear</button>
                <button type="button" data-command="paste" role="menuitem">Ctrl+B ] · Paste Buffer</button>
                <hr />
                <button type="button" data-command="copy-visible" role="menuitem">Copy Visible Text</button>
              </div>
            </div>
            <div class="terminal-quickkeys" role="group" aria-label="Quick controls">
              <button type="button" data-key="escape">Esc</button>
              <button type="button" data-key="tab">Tab</button>
              <button type="button" data-key="arrow-up">↑</button>
              <button type="button" data-key="arrow-down">↓</button>
              <button type="button" data-key="arrow-left">←</button>
              <button type="button" data-key="arrow-right">→</button>
              <button type="button" data-key="enter">⏎</button>
              <button type="button" data-key="ctrl-c" class="danger">Ctrl+C</button>
            </div>
            <span id="connection-status" class="deep-dive-status" role="status" aria-live="polite">Connecting…</span>
          </div>
        </header>
        <div id="terminal-container" class="terminal-container" role="region" aria-label="Wingman terminal"></div>
      </section>
    </main>

    <div id="pin-overlay" class="pin-overlay" role="dialog" aria-modal="true" aria-live="assertive" hidden>
      <form id="pin-form" class="pin-card">
        <h2>Enter Deep Dive PIN</h2>
        <p>Provide the access PIN to start a Wingman terminal session.</p>
        <label class="pin-label" for="pin-input">PIN Code</label>
        <input id="pin-input" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="1234" required />
        <div class="pin-actions">
          <button type="submit" class="wm-button">Unlock</button>
        </div>
        <p id="pin-error" class="pin-error" role="alert" aria-live="assertive"></p>
      </form>
    </div>

    <template id="toast-template">
      <div class="toast" role="status" aria-live="polite"></div>
    </template>

    <script type="module" src="/deep-dive.js"></script>
  </body>
</html>
